<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSides</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="world">


    <!-- HOME -->
    <section id="home" class="screen">

        <div id="map-bg">
            <img src="BGmap.png" alt="Map Background">
        </div>

        <div id="logo">
            <h1>BSides</h1>
            <p>← Routen</p>
            <p>↑ Hear gehts lang</p>
        </div>

    </section>
    
        <!-- ROUTEN -->
    <section id="routes" class="screen">
        <h1>Routen</h1>

        <div class="route-card"><h2>Route 1</h2></div>
        <div class="route-card"><h2>Route 2</h2></div>
        <div class="route-card"><h2>Route 3</h2></div>
        <div class="route-card"><h2>Route 4</h2></div>
    </section>


    <!-- NEARBY -->
    <section id="nearby" class="screen">

        <h1>In deiner Nähe</h1>

        <div class="card-container">

            <div class="place-card">
                <h2>Schlossplatz</h2>
                <p>120m entfernt</p>
            </div>

            <div class="place-card">
                <h2>Löwenwall</h2>
                <p>240m entfernt</p>
            </div>

            <div class="place-card">
                <h2>Nexus</h2>
                <p>310m entfernt</p>
            </div>

        </div>

    </section>

</div>

<script src="app.js"></script>

</body>
</html>
